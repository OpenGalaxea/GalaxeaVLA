# Final G0.5 Qwen3.5-2B VLA model config.
pretrained_ckpt: checkpoints/g05-base/checkpoints/model_state_dict.pt
use_pretrained_norm_stats: false
model_weights_to_bf16: false
enable_bf16_training: true
use_torch_compile: false
find_unused_parameters: false
batch_size: 16
num_workers: 8
pin_memory: true
persistent_workers: true
max_epochs: 2
max_steps: null
grad_accumulation_steps: 1
use_8bit_optimizer: false
learning_rate: 8.0e-05
weight_decay: 0.01
betas:
- 0.9
- 0.95
lr_scheduler_type: warmup_constant_cosine
lr_min_ratio: 0.1
warmup_steps: 500
max_grad_norm: 1.0
use_ema: false
ema:
