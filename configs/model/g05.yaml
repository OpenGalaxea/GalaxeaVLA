    hidden_size: 1024
    num_heads: 16
    patch_size: 16
    temporal_patch_size: 2
    spatial_merge_size: 2
    in_channels: 3
    intermediate_size: 4096
    out_hidden_size: 2048
    num_position_embeddings: 2304
