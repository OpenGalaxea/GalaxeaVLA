_target_: g05.data.mixture_lerobot_dataset.MixtureLerobotDataset
use_weight_normalization: true
use_weight_for_sampling: false
action_size: 32
past_action_size: 0
obs_size: 1
val_set_proportion: 0.05
is_training_set: true
embodiment_datasets:
  so100:
    type: g05.data.so100_canonical_dataset.SO100CanonicalLerobotDatasetV3
    embodiment_type: so100
    lerobot_ds_version: '3.0'
    load_images: true
    random_drop_camera: true
    shape_meta:
      action:
      - key: right_arm
        lerobot_key: action
        start_index: 0
        raw_shape: 6
        shape: 6
        time_offset: 0
      state:
      - key: right_arm
        lerobot_key: observation.state
        start_index: 0
        raw_shape: 6
        shape: 6
        time_offset: 0
      images:
      - key: exterior
        camera_type: exterior
        lerobot_key: __so100_exterior__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
      - key: wrist_left
        camera_type: wrist_left
        lerobot_key: __so100_wrist_left__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
      - key: wrist_right
        camera_type: wrist_right
        lerobot_key: __so100_wrist_right__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
    dataset_groups:
    - weight: 1.0
      dataset_dirs:
      - data/so100/so100_lerobot
processors:
  so100:
    shape_meta:
      action:
      - key: right_arm
        lerobot_key: action
        start_index: 0
        raw_shape: 6
        shape: 6
        time_offset: 0
      state:
      - key: right_arm
        lerobot_key: observation.state
        start_index: 0
        raw_shape: 6
        shape: 6
        time_offset: 0
      images:
      - key: exterior
        camera_type: exterior
        lerobot_key: __so100_exterior__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
      - key: wrist_left
        camera_type: wrist_left
        lerobot_key: __so100_wrist_left__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
      - key: wrist_right
        camera_type: wrist_right
        lerobot_key: __so100_wrist_right__
        start_index: 0
        raw_shape:
        - 3
        - 480
        - 640
        shape:
        - 3
        - 224
        - 224
        time_offset: 0
    action_state_transforms:
    - _target_: g05.data_processor.transforms.relative_action.RelativeJointTransform
      keys:
      - right_arm
    train_transforms:
      exterior: ${oc.load:configs/data/_transforms.yaml,train_head}
      wrist_left: ${oc.load:configs/data/_transforms.yaml,train_wrist}
      wrist_right: ${oc.load:configs/data/_transforms.yaml,train_wrist}
    val_transforms:
      exterior: ${oc.load:configs/data/_transforms.yaml,val_exterior}
      wrist_left: ${oc.load:configs/data/_transforms.yaml,val_wrist}
      wrist_right: ${oc.load:configs/data/_transforms.yaml,val_wrist}
    norm_default_mode: q01/q99
    action_filter:
      _target_: g05.data_processor.transforms.action_filter.DummyActionFilter
    action_state_merger:
      _target_: g05.data_processor.transforms.action_state_merger.PaddingActionMerger
      merge: true
      max_action_shape_meta:
        right_arm: 6
      max_state_shape_meta:
        right_arm: 6
    num_obs_steps: 1
    use_stepwise_action_norm: true
    drop_high_level_prob: 1.0
    use_zh_instruction: false
